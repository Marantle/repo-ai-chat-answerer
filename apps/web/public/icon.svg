  <g transform="translate(100, 60)">
    <!-- Central node -->
    <circle cx="0" cy="0" r="12" fill="#8b5cf6" stroke="#a78bfa" stroke-width="2"/>
    
    <!-- Connected nodes -->
    <line x1="0" y1="0" x2="-20" y2="-15" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="-20" cy="-15" r="6" fill="#8b5cf6"/>
    
    <line x1="0" y1="0" x2="20" y2="-15" stroke="#a78bfa" stroke-width="2"/>
