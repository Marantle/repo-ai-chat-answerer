    <circle cx="-25" cy="10" r="6" fill="#8b5cf6"/>
    
    <line x1="0" y1="0" x2="25" y2="10" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="25" cy="10" r="6" fill="#8b5cf6"/>
  </g>
  
  <!-- Sparkles/glitches -->
  <path d="M40 50 L42 55 L47 57 L42 59 L40 64 L38 59 L33 57 L38 55 Z" fill="#fbbf24"/>
  <path d="M160 80 L162 85 L167 87 L162 89 L160 94 L158 89 L153 87 L158 85 Z" fill="#34d399"/>
  <path d="M155 140 L157 143 L160 145 L157 147 L155 150 L153 147 L150 145 L153 143 Z" fill="#60a5fa"/>
  
  <!-- Text -->
  <text x="100" y="192" font-family="monospace, sans-serif" font-size="14" font-weight="bold" fill="#a78bfa" text-anchor="middle">
    REPO SLOP
