<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#1a1a2e" rx="20"/>
  
  <!-- Slop bucket -->
  <path d="M60 120 L140 120 L150 170 L50 170 Z" fill="#6b7280" stroke="#4b5563" stroke-width="3"/>
  <ellipse cx="100" cy="120" rx="40" ry="8" fill="#4b5563"/>
  
  <!-- Slop contents (messy bubbles) -->
  <circle cx="80" cy="140" r="8" fill="#10b981" opacity="0.7"/>
  <circle cx="95" cy="145" r="6" fill="#3b82f6" opacity="0.7"/>
  <circle cx="110" cy="138" r="7" fill="#8b5cf6" opacity="0.7"/>
  <circle cx="120" cy="148" r="5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="88" cy="152" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="105" cy="155" r="5" fill="#06b6d4" opacity="0.7"/>
  
